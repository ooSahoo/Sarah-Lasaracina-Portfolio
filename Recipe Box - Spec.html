    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const entryId = templateData.entry;

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    setStatus('Unpacking ' + uuids.length + ' assets...');

      const entry = manifest[uuid];

        const bytes = new Uint8Array(binaryStr.length);

            const reader = ds.readable.getReader();

            'e.preventDefault();' +

        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });

      var gen = ++navGen;
      frame.onload = function() {

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.

        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

                     document.getElementById('__bundler_placeholder');

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

do<\u002Fstrong>.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px 22px; margin-top:18px; font-size:13px; font-weight:600; color:#6B6157;\">\n        <span>Source · clueless-cooks.dc.html<\u002Fspan>\n        <span style=\"color:#C9BFB4;\">·<\u002Fspan>\n        <span>Surface · mobile-first web<\u002Fspan>\n        <span style=\"color:#C9BFB4;\">·<\u002Fspan>\n        <span>v1.0<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ANATOMY -->\n    <section style=\"margin-bottom:44px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">1 · Anatomy<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1.25fr 1fr; gap:30px; align-items:start;\">\n\n        <!-- live mini box -->\n        <div style=\"border-radius:18px; overflow:hidden; border:1.5px solid rgba(21,18,15,0.1); background:#fff; box-shadow:0 14px 40px rgba(120,50,80,0.16);\">\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; padding:14px 16px; border-bottom:1px solid rgba(21,18,15,0.08); background:#FBF7F1;\">\n            <span style=\"padding:6px 13px; border-radius:999px; background:#2E7D52; color:#fff; font-weight:700; font-size:12px;\">Risotti<\u002Fspan>\n            <span style=\"padding:6px 13px; border-radius:999px; border:1.5px solid rgba(21,18,15,0.18); color:#6B6157; font-weight:600; font-size:12px;\">Primi<\u002Fspan>\n            <span style=\"padding:6px 13px; border-radius:999px; border:1.5px solid rgba(21,18,15,0.18); color:#6B6157; font-weight:600; font-size:12px;\">Autunno<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:18px 18px 22px;\">\n            <p style=\"margin:0 0 3px; font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#9A8F84;\">Risotto brie &amp; noci · 6 min read<\u002Fp>\n            <h3 style=\"margin:0 0 16px; font-family:'Caveat',cursive; font-weight:700; font-size:32px; line-height:1; color:#15120F;\">Risotto brie e noci<\u002Fh3>\n            <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:18px;\">\n              <div style=\"padding:9px 6px; border-radius:11px; background:#FBF4EC; text-align:center;\"><p style=\"margin:0; font-size:10px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:#9A8F84;\">Serv<\u002Fp><p style=\"margin:3px 0 0; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:17px;\">2<\u002Fp><\u002Fdiv>\n              <div style=\"padding:9px 6px; border-radius:11px; background:#FBF4EC; text-align:center;\"><p style=\"margin:0; font-size:10px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:#9A8F84;\">Prep<\u002Fp><p style=\"margin:3px 0 0; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:17px;\">10’<\u002Fp><\u002Fdiv>\n              <div style=\"padding:9px 6px; border-radius:11px; background:#FBF4EC; text-align:center;\"><p style=\"margin:0; font-size:10px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:#9A8F84;\">Cook<\u002Fp><p style=\"margin:3px 0 0; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:17px;\">20’<\u002Fp><\u002Fdiv>\n              <div style=\"padding:9px 6px; border-radius:11px; background:#FFF0E3; text-align:center; outline:2px solid rgba(192,83,42,0.25);\"><p style=\"margin:0; font-size:10px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:#C0532A;\">Tools<\u002Fp><p style=\"margin:3px 0 0; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:11px; line-height:1.1; color:#C0532A;\">pan + ladle<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px; border-radius:14px; background:#FFF7EF; border:1.5px solid rgba(192,83,42,0.18); margin-bottom:14px;\">\n              <p style=\"margin:0 0 9px; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:12px; letter-spacing:0.04em; text-transform:uppercase; color:#C0532A;\">Ingredients · serves 2<\u002Fp>\n              <div style=\"display:flex; justify-content:space-between; padding-bottom:6px; border-bottom:1px dashed rgba(21,18,15,0.12);\"><span style=\"font-size:13px;\">Carnaroli rice<\u002Fspan><span style=\"font-weight:700; font-size:13px; color:#C0532A;\">160 g<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:11px; align-items:flex-start; padding:13px; border-radius:14px; background:#FBF7F1; margin-bottom:10px;\">\n              <span style=\"flex:none; width:26px; height:26px; border-radius:50%; background:#C0532A; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:13px;\">2<\u002Fspan>\n              <span style=\"flex:1;\">\n                <span style=\"display:block; font-weight:700; font-size:14px; color:#2E7D52; margin-bottom:3px;\">Toast the rice.<\u002Fspan>\n                <span style=\"display:block; font-size:13px; line-height:1.55; color:#322C26;\">Add <span style=\"color:#C0532A; font-weight:600; border-bottom:1.5px solid rgba(192,83,42,0.4);\">160 g rice<\u002Fspan> and toast 2 min. <span style=\"color:#2E7D52; font-weight:600;\">Never let it dry out.<\u002Fspan><\u002Fspan>\n                <span style=\"margin-top:9px; display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:#9A8F84;\"><span style=\"width:18px; height:18px; border-radius:6px; border:2px solid rgba(21,18,15,0.25);\"><\u002Fspan> done<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:12px 0 0; font-family:'Caveat',cursive; font-weight:700; font-size:19px; color:#C0532A;\">“Questo è spaziale!” — tasting note.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- callouts -->\n        <ol style=\"margin:0; padding:0; list-style:none; counter-reset:c; font-size:14px; line-height:1.5;\">\n          <li style=\"display:flex; gap:11px; padding:9px 0; border-bottom:1px solid rgba(21,18,15,0.07);\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#15120F; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;\">A<\u002Fspan><span><strong>Category pills<\u002Fstrong> — active one filled, the rest outlined. Lateral wayfinding.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:11px; padding:9px 0; border-bottom:1px solid rgba(21,18,15,0.07);\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#15120F; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;\">B<\u002Fspan><span><strong>Title &amp; meta<\u002Fstrong> — handwritten display title (Caveat) + read-time eyebrow.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:11px; padding:9px 0; border-bottom:1px solid rgba(21,18,15,0.07);\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#15120F; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;\">C<\u002Fspan><span><strong>Quick info<\u002Fstrong> — servings, prep, cook &amp; <em>tools<\u002Fem>. The Tools tile is accented so prerequisites never hide.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:11px; padding:9px 0; border-bottom:1px solid rgba(21,18,15,0.07);\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#15120F; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;\">D<\u002Fspan><span><strong>Ingredients<\u002Fstrong> — shopping list, amounts in orange.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:11px; padding:9px 0; border-bottom:1px solid rgba(21,18,15,0.07);\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#15120F; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;\">E<\u002Fspan><span><strong>Step row<\u002Fstrong> — number badge, green title, body with embedded quantities, tap-to-check.<\u002Fspan><\u002Fli>\n          <li style=\"display:flex; gap:11px; padding:9px 0;\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#15120F; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;\">F<\u002Fspan><span><strong>Tasting note<\u002Fstrong> — handwritten payoff line. The brand’s voice signature.<\u002Fspan><\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- COLOUR LANGUAGE -->\n    <section style=\"margin-bottom:44px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">2 · Colour language<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n        <div style=\"padding:20px 22px; border-radius:16px; background:#FFF7EF; border:1.5px solid rgba(192,83,42,0.2);\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:18px; height:18px; border-radius:5px; background:#C0532A;\"><\u002Fspan><strong style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:16px;\">Orange = ingredients &amp; amounts<\u002Fstrong><\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.55; color:#322C26;\">Any quantity or ingredient inside a step is orange with a soft underline. Lets the eye jump straight to “what &amp; how much” without leaving the step.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:20px 22px; border-radius:16px; background:#EDF7F0; border:1.5px solid rgba(46,125,82,0.2);\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:18px; height:18px; border-radius:5px; background:#2E7D52;\"><\u002Fspan><strong style=\"font-family:'Bricolage Grotesque',sans-serif; font-size:16px;\">Green = technique &amp; warnings<\u002Fstrong><\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.55; color:#322C26;\">Step titles and any “don’t do this” caution are green — the verbs and the guardrails. Also the checked-state colour.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TOKENS -->\n    <section style=\"margin-bottom:44px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">3 · Colour tokens<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;\">\n        <div data-sw=\"\"><span style=\"display:block; height:46px; border-radius:10px; background:#C0532A; border:1px solid rgba(0,0,0,0.06);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Accent / orange<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#C0532A<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#2E7D52; border:1px solid rgba(0,0,0,0.06);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Technique / green<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#2E7D52<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#15120F; border:1px solid rgba(0,0,0,0.06);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Ink / primary text<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#15120F<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#322C26; border:1px solid rgba(0,0,0,0.06);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Body text<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#322C26<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#9A8F84; border:1px solid rgba(0,0,0,0.06);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Muted / labels<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#9A8F84<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#FBF7F1; border:1px solid rgba(0,0,0,0.1);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Step surface<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#FBF7F1<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#FBF4EC; border:1px solid rgba(0,0,0,0.1);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Info tile<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#FBF4EC<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#FFF7EF; border:1px solid rgba(0,0,0,0.1);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Ingredients bg<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#FFF7EF<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#EAF6EC; border:1px solid rgba(0,0,0,0.1);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Step checked bg<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#EAF6EC<\u002Fp><\u002Fdiv>\n        <div><span style=\"display:block; height:46px; border-radius:10px; background:#fff; border:1px solid rgba(0,0,0,0.12);\"><\u002Fspan><p style=\"margin:7px 0 0; font-weight:700; font-size:13px;\">Card surface<\u002Fp><p style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; color:#6B6157;\">#FFFFFF<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TYPE -->\n    <section style=\"margin-bottom:44px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">4 · Typography<\u002Fh2>\n      <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n        <thead><tr style=\"text-align:left; border-bottom:2px solid #15120F;\"><th style=\"padding:9px 8px; font-family:'Bricolage Grotesque',sans-serif;\">Role<\u002Fth><th style=\"padding:9px 8px; font-family:'Bricolage Grotesque',sans-serif;\">Family<\u002Fth><th style=\"padding:9px 8px; font-family:'Bricolage Grotesque',sans-serif;\">Size / weight<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid rgba(21,18,15,0.1);\"><td style=\"padding:9px 8px;\">Recipe title<\u002Ftd><td style=\"padding:9px 8px;\">Caveat<\u002Ftd><td style=\"padding:9px 8px; font-family:'JetBrains Mono',monospace;\">42px / 700<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid rgba(21,18,15,0.1);\"><td style=\"padding:9px 8px;\">Tasting note<\u002Ftd><td style=\"padding:9px 8px;\">Caveat<\u002Ftd><td style=\"padding:9px 8px; font-family:'JetBrains Mono',monospace;\">24px / 700<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid rgba(21,18,15,0.1);\"><td style=\"padding:9px 8px;\">Section / pill / number<\u002Ftd><td style=\"padding:9px 8px;\">Bricolage Grotesque<\u002Ftd><td style=\"padding:9px 8px; font-family:'JetBrains Mono',monospace;\">13–22px / 700–800<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid rgba(21,18,15,0.1);\"><td style=\"padding:9px 8px;\">Step title<\u002Ftd><td style=\"padding:9px 8px;\">Hanken Grotesk<\u002Ftd><td style=\"padding:9px 8px; font-family:'JetBrains Mono',monospace;\">16px / 700<\u002Ftd><\u002Ftr>\n          <tr style=\"border-bottom:1px solid rgba(21,18,15,0.1);\"><td style=\"padding:9px 8px;\">Step body / ingredients<\u002Ftd><td style=\"padding:9px 8px;\">Hanken Grotesk<\u002Ftd><td style=\"padding:9px 8px; font-family:'JetBrains Mono',monospace;\">15px / 400 · 1.6<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:9px 8px;\">Eyebrow / labels<\u002Ftd><td style=\"padding:9px 8px;\">Hanken / Bricolage<\u002Ftd><td style=\"padding:9px 8px; font-family:'JetBrains Mono',monospace;\">12–13px / 600 · 0.04em ALL-CAPS<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fsection>\n\n    <!-- SPACING -->\n    <section style=\"margin-bottom:44px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">5 · Spacing &amp; radius<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; font-size:14px;\">\n        <div style=\"padding:16px 18px; border-radius:12px; background:#FBF7F1;\"><strong>Card<\u002Fstrong><br><span style=\"color:#6B6157;\">radius 22 · pad 26 28 30 · border 1.5px ink@10% · shadow 0 18 54 plum@16%<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px 18px; border-radius:12px; background:#FBF7F1;\"><strong>Step row<\u002Fstrong><br><span style=\"color:#6B6157;\">radius 16 · pad 16 · gap 14 between rows<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px 18px; border-radius:12px; background:#FBF7F1;\"><strong>Number badge<\u002Fstrong><br><span style=\"color:#6B6157;\">30×30 circle · centred<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px 18px; border-radius:12px; background:#FBF7F1;\"><strong>Checkbox<\u002Fstrong><br><span style=\"color:#6B6157;\">20×20 · radius 6 · border 2px<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px 18px; border-radius:12px; background:#FBF7F1;\"><strong>Pills / tiles<\u002Fstrong><br><span style=\"color:#6B6157;\">pill radius 999 · info tile radius 14<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px 18px; border-radius:12px; background:#FBF7F1;\"><strong>Ingredients / notes<\u002Fstrong><br><span style=\"color:#6B6157;\">radius 16 · pad 20 22 · 1px dashed dividers<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- STATES -->\n    <section style=\"margin-bottom:44px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">6 · Step states<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n        <div>\n          <p style=\"margin:0 0 8px; font-size:13px; font-weight:700; color:#6B6157;\">Default<\u002Fp>\n          <div style=\"display:flex; gap:12px; align-items:flex-start; padding:16px; border-radius:16px; background:#FBF7F1;\">\n            <span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#C0532A; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:15px;\">3<\u002Fspan>\n            <span style=\"flex:1;\">\n              <span style=\"display:block; font-weight:700; font-size:16px; color:#2E7D52; margin-bottom:4px;\">Add stock, ladle by ladle.<\u002Fspan>\n              <span style=\"display:block; font-size:15px; line-height:1.6; color:#322C26;\">Pour one ladle, stir until absorbed, repeat ~18 min. <span style=\"color:#2E7D52; font-weight:600;\">Only add the next once the last is nearly gone.<\u002Fspan><\u002Fspan>\n              <span style=\"margin-top:12px; display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:#9A8F84;\"><span style=\"width:20px; height:20px; border-radius:6px; border:2px solid rgba(21,18,15,0.25);\"><\u002Fspan> done<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p style=\"margin:0 0 8px; font-size:13px; font-weight:700; color:#2E7D52;\">Checked<\u002Fp>\n          <div style=\"display:flex; gap:12px; align-items:flex-start; padding:16px; border-radius:16px; background:#EAF6EC;\">\n            <span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#2E7D52; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:15px;\">3<\u002Fspan>\n            <span style=\"flex:1;\">\n              <span style=\"display:block; font-weight:700; font-size:16px; color:#2E7D52; margin-bottom:4px; opacity:0.5;\">Add stock, ladle by ladle.<\u002Fspan>\n              <span style=\"display:block; font-size:15px; line-height:1.6; color:#322C26; opacity:0.5;\">Pour one ladle, stir until absorbed, repeat ~18 min. Only add the next once the last is nearly gone.<\u002Fspan>\n              <span style=\"margin-top:12px; display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:#2E7D52;\"><span style=\"width:20px; height:20px; border-radius:6px; border:2px solid #2E7D52; background:#2E7D52; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:13px;\">✓<\u002Fspan> done<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- BEHAVIOUR -->\n    <section>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#6B6157; margin:0 0 18px;\">7 · Behaviour &amp; rules<\u002Fh2>\n      <ul style=\"margin:0; padding-left:20px; font-size:15px; line-height:1.7; color:#322C26;\">\n        <li>The whole step row is the tap target — one messy-thumb tap toggles checked. Transition ~0.15–0.18s.<\u002Fli>\n        <li>Checked: surface → green tint, number badge → green, body text → 50% opacity, checkbox fills with ✓. The tap is reversible.<\u002Fli>\n        <li>Quantities live <strong>inside<\u002Fstrong> the step (orange), so the cook never scrolls back to an ingredients list mid-task. The top list is for shopping, not cooking.<\u002Fli>\n        <li>Tools are surfaced in Quick Info, never buried in footnotes — no prerequisite ambushes you mid-recipe.<\u002Fli>\n        <li>Category pills are persistent and clickable for lateral navigation to similar recipes.<\u002Fli>\n        <li>Accessibility to-do: the 20px checkbox is below the 44px minimum hit target — the row compensates, but the checkbox alone shouldn’t be the only target.<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n  <\u002Farticle>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"recipe-box-spec.dc"}
